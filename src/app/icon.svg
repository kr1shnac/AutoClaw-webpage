<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="100" y2="100">
      <stop stopColor="#1e293b" />
      <stop offset="1" stopColor="#0f172a" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="100">
      <stop stopColor="#0f172a" />
      <stop offset="1" stopColor="#020617" />
    </linearGradient>
  </defs>
  <!-- Background circle for clear tab contrast -->
  <circle cx="50" cy="50" r="48" fill="#0b0f19" stroke="#ec4899" strokeWidth="2" />
  <!-- Ears/Antennas -->
  <rect x="15" y="35" width="8" height="15" rx="3" fill="#cbd5e1" />
  <rect x="77" y="35" width="8" height="15" rx="3" fill="#cbd5e1" />
  <!-- Bot Body -->
  <rect x="20" y="25" width="60" height="50" rx="15" fill="url(#bodyGrad)" stroke="#ec4899" strokeWidth="4" />
  <!-- Bot Screen -->
  <rect x="28" y="33" width="44" height="30" rx="6" fill="url(#screenGrad)" stroke="#334155" strokeWidth="2" />
  <!-- Cute Eyes -->
  <path d="M 38 45 Q 42 42 46 45" stroke="#ec4899" strokeWidth="4" strokeLinecap="round" fill="none" />
  <path d="M 54 45 Q 58 42 62 45" stroke="#ec4899" strokeWidth="4" strokeLinecap="round" fill="none" />
  <!-- Blushing Cheeks -->
  <circle cx="35" cy="52" r="4" fill="#ec4899" opacity="0.8" />
  <circle cx="65" cy="52" r="4" fill="#ec4899" opacity="0.8" />
  <!-- Cute little mouth -->
  <path d="M 47 52 Q 50 55 53 52" stroke="#3b82f6" strokeWidth="3" strokeLinecap="round" fill="none" />
</svg>
